name: Telegram Bot 24/7 Runner

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'database.json'  # ඩේටාබේස් එක අප්ඩේට් වුණාට අලුත් බොට්ස්ලා හැදෙන එක මේකෙන් නවතිනවා!
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Telegram Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.MY_GH_TOKEN }}
          GITHUB_REPO_NAME: ${{ secrets.MY_GH_REPO }}
          GITHUB_PAGES_URL: ${{ secrets.MY_PAGES_URL }}
          SHORTENER_API: ${{ secrets.SHORTENER_API }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BLOG_URL: ${{ secrets.BLOG_URL }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: python bot.py
