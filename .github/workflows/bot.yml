name: Telegram Bot 24/7 Runner

on:
  push:
    branches: [ main ]
  schedule:
    # පැයෙන් පැයට ස්වයංක්‍රීයව අලුතින් Run වී ඇහැරී තියෙන්න සෙට් කරයි
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Telegram Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
          SHORTENER_API: ${{ secrets.SHORTENER_API }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BLOG_URL: ${{ secrets.BLOG_URL }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
        run: python bot.py
